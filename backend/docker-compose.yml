version: '3.8'

services:
  web:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    environment:
      - DATABASE_URL=mysql+pymysql://sago_user:sago_pass@db:3306/sago_db
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=sago_db
      - MYSQL_USER=sago_user
      - MYSQL_PASSWORD=sago_pass
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
